<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Fashion Feed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 40px 20px 20px;
      border-bottom: 1px solid #1a1a1a;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #e0e0e0;
    }
    header p {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 2px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    .card {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .card img {
      width: 100%;
      height: 480px;
      object-fit: cover;
      display: block;
      background: #1a1a1a;
    }
    .card-body {
      padding: 16px;
    }
    .card-body .caption {
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .card-body .timestamp {
      font-size: 0.75rem;
      color: #555;
      margin-top: 4px;
    }
    .loading, .error {
      text-align: center;
      padding: 80px 20px;
      color: #555;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
    }
    .lightbox .close {
      position: absolute;
      top: 20px; right: 30px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      background: none;
      border: none;
    }
    .lightbox .close:hover { opacity: 1; }
    footer {
      text-align: center;
      padding: 30px 20px;
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 1px;
    }
    @media (max-width: 768px) {
      header h1 { font-size: 1.4rem; letter-spacing: 4px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
      .card img { height: 360px; }
      .container { padding: 20px 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Fashion Feed</h1>
    <p>AI-generated fashion photography</p>
  </header>

  <div class="container">
    <div class="grid" id="feed"></div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="close">&times;</button>
    <img id="lightbox-img" alt="">
  </div>

  <footer>Powered by AI &middot; Updated every 6 hours</footer>

  <script>
    const feed = document.getElementById('feed');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(src) {
      lightbox.classList.add('active');
      lightboxImg.src = src;
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      lightboxImg.src = '';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    lightbox.querySelector('.close').addEventListener('click', (e) => {
      e.stopPropagation();
      closeLightbox();
    });

    fetch('content/post.json')
      .then(r => {
        if (!r.ok) throw new Error('Failed to load');
        return r.json();
      })
      .then(data => {
        if (!data.images || data.images.length === 0) {
          feed.innerHTML = '<div class="error">No images yet</div>';
          return;
        }
        data.images.forEach(src => {
          const div = document.createElement('div');
          div.className = 'card';
          div.onclick = () => openLightbox(src);
          div.innerHTML = `
            <img src="${src}" alt="AI Fashion" loading="lazy" onerror="this.parentElement.style.display='none'">
            <div class="card-body">
              <div class="caption">${data.caption || 'AI Fashion'}</div>
              <div class="timestamp">${data.timestamp ? new Date(data.timestamp * 1000).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : ''}</div>
            </div>
          `;
          feed.appendChild(div);
        });
      })
      .catch(() => {
        feed.innerHTML = '<div class="error">Content loading...</div>';
      });
  </script>
</body>
</html>
