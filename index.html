<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Fashion Feed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
    }
    .header-left {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 10px;
    }
    .header-right {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }
    header .title-group { text-align: center; }
    header h1 {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #e0e0e0;
    }
    header p {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #666;
      letter-spacing: 2px;
    }
    .nav-btn {
      background: #1a1a1a;
      color: #ccc;
      border: 1px solid #333;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .nav-btn:hover {
      background: #2a2a2a;
      border-color: #666;
      color: #fff;
    }
    .gen-btn {
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #444;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
    }
    .gen-btn:hover {
      background: #2a2a2a;
      border-color: #888;
    }
    .container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .card {
      background: #111;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .card img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      display: block;
      background: #1a1a1a;
    }
    .card-body {
      padding: 12px;
    }
    .card-body .caption {
      font-size: 0.75rem;
      color: #999;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-body .model-name {
      font-size: 0.65rem;
      color: #444;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }
    .card-body .timestamp {
      font-size: 0.7rem;
      color: #555;
      margin-top: 3px;
    }
    .loading, .error, .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: #555;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
    }
    .lightbox .close {
      position: absolute;
      top: 20px; right: 30px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      background: none;
      border: none;
    }
    .lightbox .close:hover { opacity: 1; }
    .gen-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 3000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .gen-overlay.active { display: flex; }
    .gen-overlay .spinner {
      width: 48px; height: 48px;
      border: 3px solid #222;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gen-overlay p {
      margin-top: 20px;
      color: #aaa;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .gen-overlay .sub {
      margin-top: 6px;
      color: #555;
      font-size: 0.75rem;
      letter-spacing: 1px;
    }
    footer {
      text-align: center;
      padding: 24px 20px;
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 1px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .modal.active { display: flex; }
    .modal-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 36px 32px 28px;
      width: 360px;
      max-width: 90vw;
      text-align: center;
    }
    .modal-box h2 {
      font-weight: 300;
      letter-spacing: 3px;
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #e0e0e0;
    }
    .modal-box input {
      width: 100%;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 12px;
    }
    .modal-box input:focus { border-color: #666; }
    .modal-box .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .modal-box button {
      padding: 10px 24px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #ccc;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.3s;
    }
    .modal-box button:hover { background: #2a2a2a; }
    .modal-box .primary {
      background: #2a2a2a;
      border-color: #555;
      color: #fff;
    }
    .modal-box .primary:hover {
      background: #3a3a3a;
      border-color: #888;
    }
    .modal-box .msg {
      font-size: 0.8rem;
      margin-top: 10px;
      color: #888;
    }
    .modal-box .msg.error { color: #c55; }
    .modal-box .msg.success { color: #5a5; }
    @media (max-width: 1024px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
      .card img { height: 320px; }
    }
    @media (max-width: 768px) {
      header { flex-wrap: wrap; padding: 16px 12px; gap: 8px; }
      .header-left, .header-right { position: static; transform: none; }
      header .title-group { width: 100%; order: -1; margin-bottom: 8px; }
      header h1 { font-size: 1.2rem; letter-spacing: 3px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .card img { height: 260px; }
      .container { padding: 12px; }
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .card img { height: 200px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="galleries.html" class="nav-btn">Galeriler</a>
    </div>
    <div class="title-group">
      <h1>AI Fashion Feed</h1>
      <p>AI-generated fashion photography</p>
    </div>
    <div class="header-right">
      <button class="gen-btn" id="genBtn">Generate!</button>
    </div>
  </header>

  <div class="container">
    <div class="grid" id="feed"></div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="close">&times;</button>
    <img id="lightbox-img" alt="">
  </div>

  <div class="gen-overlay" id="genOverlay">
    <div class="spinner"></div>
    <p>Üretiliyor...</p>
    <div class="sub" id="genStatus">Workflow başlatılıyor</div>
  </div>

  <footer>Powered by AI &middot; Updated every 6 hours</footer>

  <script>
    const OWNER = 'aydannadya31';
    const REPO = 'ai-fashion-auto-site';
    const WORKFLOW = 'auto-fashion.yml';
    const PAT_KEY = 'gh_fashion_pat';
    const MAX_POSTS = 10;

    const feed = document.getElementById('feed');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const genBtn = document.getElementById('genBtn');

    /* lightbox */
    function openLightbox(src) {
      lightbox.classList.add('active');
      lightboxImg.src = src;
    }
    function closeLightbox() {
      lightbox.classList.remove('active');
      lightboxImg.src = '';
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
    lightbox.querySelector('.close').addEventListener('click', (e) => {
      e.stopPropagation();
      closeLightbox();
    });

    /* feed */
    function renderImages(images, caption, timestamp) {
      images.forEach(item => {
        const src = typeof item === 'string' ? item : item.url;
        const model = typeof item === 'string' ? '' : (item.model || '');
        const div = document.createElement('div');
        div.className = 'card';
        div.onclick = () => openLightbox(src);
        div.innerHTML = `
          <img src="${src}" alt="AI Fashion" loading="lazy" onerror="this.parentElement.style.display='none'">
          <div class="card-body">
            <div class="caption">${caption || 'AI Fashion'}</div>
            ${model ? `<div class="model-name">${model}</div>` : ''}
            <div class="timestamp">${timestamp ? new Date(timestamp * 1000).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : ''}</div>
          </div>
        `;
        feed.appendChild(div);
      });
    }

    fetch('content/history.json')
      .then(r => {
        if (!r.ok) throw new Error('Failed to load');
        return r.json();
      })
      .then(history => {
        if (!history || history.length === 0) {
          feed.innerHTML = '<div class="empty">No images yet</div>';
          return;
        }
        const posts = history.slice(-MAX_POSTS).reverse();
        posts.forEach(post => {
          if (post.images && post.images.length) {
            renderImages(post.images.slice().reverse(), post.caption, post.timestamp);
          }
        });
      })
      .catch(() => {
        /* fallback to post.json */
        fetch('content/post.json')
          .then(r => r.json())
          .then(data => {
            if (data.images && data.images.length) {
              renderImages(data.images, data.caption, data.timestamp);
            } else {
              feed.innerHTML = '<div class="empty">No images yet</div>';
            }
          })
          .catch(() => {
            feed.innerHTML = '<div class="error">Content loading...</div>';
          });
      });

    /* generate modal */
    const genOverlay = document.getElementById('genOverlay');
    const genStatus = document.getElementById('genStatus');

    genBtn.addEventListener('click', async () => {
      let pat = localStorage.getItem(PAT_KEY);
      if (!pat) {
        pat = prompt('Enter your GitHub Personal Access Token (workflow write permission):');
        if (!pat) return;
        localStorage.setItem(PAT_KEY, pat);
      }

      genOverlay.classList.add('active');
      genStatus.textContent = 'Workflow başlatılıyor';

      const headers = {
        'Authorization': `Bearer ${pat}`,
        'Accept': 'application/vnd.github+json'
      };

      try {
        const lastRuns = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=1`,
          { headers }
        ).then(r => r.json());
        const lastId = lastRuns.workflow_runs?.[0]?.id || 0;

        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
          {
            method: 'POST',
            headers: { ...headers, 'Content-Type': 'application/json' },
            body: JSON.stringify({ ref: 'main' })
          }
        );

        if (!res.ok) {
          if (res.status === 401 || res.status === 403) {
            localStorage.removeItem(PAT_KEY);
            throw new Error('Token geçersiz veya süresi dolmuş');
          }
          throw new Error(`API hatası (${res.status})`);
        }

        genStatus.textContent = 'Görseller üretiliyor...';

        let waited = 0;
        while (waited < 300) {
          await new Promise(r => setTimeout(r, 8000));
          waited += 8;
          const check = await fetch(
            `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=1`,
            { headers }
          ).then(r => r.json());
          const run = check.workflow_runs?.[0];
          if (run && run.id > lastId && run.status === 'completed') {
            genStatus.textContent = 'Tamamlandı! Sayfa yenileniyor...';
            await new Promise(r => setTimeout(r, 2000));
            location.reload();
            return;
          }
          genStatus.textContent = `Üretiliyor... (${waited}s)`;
        }
        genStatus.textContent = 'Zaman aşımı — sayfa yenileniyor';
        await new Promise(r => setTimeout(r, 2000));
        location.reload();
      } catch (err) {
        genOverlay.classList.remove('active');
        alert(err.message);
      }
    });
  </script>
</body>
</html>
