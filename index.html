<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Fashion Feed</title>
  <style>
    body { font-family: Arial; background:#0f0f0f; color:white; margin:0; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:10px; }
    .card { background:#1a1a1a; padding:10px; border-radius:10px; }
    img { width:100%; border-radius:10px; }
  </style>
</head>
<body>

<h1 style="text-align:center;">AI Fashion Feed</h1>
<div class="grid" id="feed"></div>

<script>
fetch('content/post.json')
  .then(r => r.json())
  .then(data => {
    const feed = document.getElementById('feed');

    data.images.forEach(img => {
      const div = document.createElement('div');
      div.className = "card";
      div.innerHTML = `
        <img src="${img}">
        <p>${data.caption}</p>
      `;
      feed.appendChild(div);
    });
  });
</script>

</body>
</html>
