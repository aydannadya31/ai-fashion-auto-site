name: generate

on:
  schedule:
    - cron: "0 * * * *"   # her 60 dk
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ✅ checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Python kurulumu
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ pip upgrade (çok önemli)
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # ✅ dependencies
      - name: Install requirements
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ✅ generator çalıştır
      - name: Run generator
        run: python scripts/generator.py

      # ✅ commit + push
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto generated" || echo "No changes"
          git push
