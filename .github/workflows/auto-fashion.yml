name: AI Fashion Generator

on:
  schedule:
    - cron: "0 * * * *"   # her 60 dakika
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Generate Fashion Image
        run: |
          mkdir -p content/images

          TIMESTAMP=$(date +%s)
          PROMPT="modern fashion editorial woman outfit $TIMESTAMP"

          IMAGE_URL="https://image.pollinations.ai/prompt/$PROMPT"

          FILE="content/images/fashion_$TIMESTAMP.jpg"

          curl -L "$IMAGE_URL" -o "$FILE"

          echo "{\"title\":\"AI Fashion Look\",\"prompt\":\"$PROMPT\",\"image\":\"$FILE\",\"date\":\"$(date)\"}" >> content/data.json

      - name: Commit Changes
        run: |
          git config user.name "AI Bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "New AI Fashion Image" || echo "No changes"
          git push
