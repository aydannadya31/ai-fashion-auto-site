name: generate

on:
  schedule:
    - cron: "0 * * * *"   # her 60 dakika
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run generator
        run: python generate.py

      - name: Commit images
        run: |
          git config user.name "auto-bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "auto generated image" || echo "no changes"
          git push
