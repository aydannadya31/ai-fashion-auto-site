name: AI Fashion Generator

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Fashion Engine
        run: python scripts/generator.py

      - name: Commit
        run: |
          git config user.name "AI Bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "New AI Fashion Editorial" || echo "No changes"
          git push
