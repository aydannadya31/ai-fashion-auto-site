name: AI Fashion Generator

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create folders
        run: |
          mkdir -p content/images
          touch content/data.json

      - name: Generate AI Fashion Image
        run: |
          TIMESTAMP=$(date +%s)
          PROMPT="modern fashion editorial woman outfit $TIMESTAMP"

          SAFE_PROMPT=$(echo $PROMPT | sed 's/ /%20/g')

          IMAGE_URL="https://image.pollinations.ai/prompt/$SAFE_PROMPT"

          FILE="content/images/fashion_$TIMESTAMP.jpg"

          curl -f -L "$IMAGE_URL" -o "$FILE"

          echo "{\"title\":\"AI Fashion Look\",\"prompt\":\"$PROMPT\",\"image\":\"$FILE\",\"date\":\"$(date)\"}" >> content/data.json

      - name: Commit and push
        run: |
          git config user.name "AI Bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "Auto AI fashion image" || echo "Nothing to commit"
          git push
