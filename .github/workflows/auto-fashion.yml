name: AI Fashion Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Generate content
        continue-on-error: true
        run: python scripts/generator.py
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Update history
        continue-on-error: true
        shell: python
        run: |
          import json, os
          if os.path.exists('content/post.json'):
              post = json.load(open('content/post.json'))
              if os.path.exists('content/history.json'):
                  history = json.load(open('content/history.json'))
              else:
                  history = []
              if not history or history[-1].get('timestamp') != post.get('timestamp'):
                  history.append(post)
                  json.dump(history, open('content/history.json', 'w'), indent=2)
                  print("History updated")
              else:
                  print("No new post, skipping history")

      - name: Commit changes
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "bot@ai.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "AI fashion update $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
