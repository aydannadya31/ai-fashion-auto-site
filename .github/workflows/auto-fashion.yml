name: AI Fashion Generator

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare folders
        run: |
          mkdir -p content/images
          touch content/data.json

      - name: Generate AI Image
        run: |
          TIMESTAMP=$(date +%s)

          PROMPT="modern fashion editorial woman outfit"

          SAFE_PROMPT=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$PROMPT'''))")

          IMAGE_URL="https://image.pollinations.ai/prompt/$SAFE_PROMPT"

          FILE="content/images/fashion_$TIMESTAMP.jpg"

          curl -L "$IMAGE_URL" --output "$FILE"

          echo "{\"title\":\"AI Fashion Look\",\"prompt\":\"$PROMPT\",\"image\":\"$FILE\",\"date\":\"$(date)\"}" >> content/data.json

      - name: Commit changes
        run: |
          git config user.name "AI Bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "Auto AI fashion image" || echo "No changes"
          git push
